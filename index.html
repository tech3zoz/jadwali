<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jadwali</title>
<meta name="description" content="Jadwali — a rotating-shift & life organizer: shifts, appointments, tasks, habits, content ideas.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jadwali">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230B1220'/%3E%3Ccircle cx='50' cy='50' r='34' fill='none' stroke='%2338BDF8' stroke-width='8'/%3E%3Cpath d='M50 30v20l14 10' stroke='%23F5B942' stroke-width='8' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script>
  // No-flash: apply saved language direction + theme before first paint.
  (function(){
    try{
      var l = localStorage.getItem('aziz_lang')  || 'en';
      var th = localStorage.getItem('aziz_theme') || 'minimal';
      var r = document.documentElement;
      r.lang = l; r.dir = (l === 'ar' ? 'rtl' : 'ltr');
      r.setAttribute('data-theme', th);
    }catch(e){}
  })();
</script>
</head>
<body>

<header class="top">
  <div class="head-title">
    <h1 data-i18n="appName">Jadwali</h1>
    <div class="sub" data-i18n="tagline">Shift organizer</div>
  </div>
  <div class="head-actions">
    <button class="head-pill" id="newHabitBtn">
      <span class="plus">+</span><span data-i18n="newHabit">New Habit</span>
    </button>
    <button class="head-icon" id="summaryBtn" aria-label="Weekly summary">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>
    </button>
    <button class="settings-btn" id="settingsBtn" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</header>

<div class="hero">
  <div class="gauge-wrap">
    <svg width="60" height="60" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="25" fill="none" stroke="#232E48" stroke-width="7"/>
      <circle id="gaugeRing" cx="30" cy="30" r="25" fill="none" stroke="#38BDF8" stroke-width="7"
        stroke-linecap="round" stroke-dasharray="157" stroke-dashoffset="157"/>
    </svg>
    <div class="gauge-center" id="heroIcon">🌙</div>
  </div>
  <div class="hero-info">
    <div class="hero-eyebrow" id="heroEyebrow" data-i18n="loading">Loading…</div>
    <div class="hero-title" id="heroTitle">—</div>
    <div class="hero-countdown mono" id="heroCountdown">--:--:--</div>
    <div class="hero-sub" id="heroSub"></div>
  </div>
</div>

<div id="upcomingWidget"></div>

<section class="panel active" id="panel-cal">
  <div class="cal-nav">
    <div class="navbtns">
      <button id="prevMonth">‹</button>
      <button id="nextMonth">›</button>
    </div>
    <div class="month-label" id="monthLabel">—</div>
    <div class="today-wrap">
      <button class="todaybtn" id="todayBtn" data-i18n="todayBtn">Today ▾</button>
      <div class="today-menu" id="todayMenu">
        <button data-range="1" data-i18n="rangeToday">Today</button>
        <button data-range="3" data-i18n="range3">3 days</button>
        <button data-range="7" data-i18n="rangeWeek">Week</button>
      </div>
    </div>
  </div>
  <div id="quickView"></div>
  <div class="grid-wrap">
    <div class="cal-grid" id="calGrid"></div>
  </div>
</section>

<section class="panel" id="panel-appt">
  <div class="add-card">
    <input id="apptTitle" data-i18n-ph="apptNamePh" placeholder="Appointment name…">
    <div class="row2">
      <input id="apptDate" type="date" class="mono">
      <input id="apptTime" type="time" class="mono">
    </div>
    <button class="primary" id="apptAdd" data-i18n="apptAdd">Add appointment</button>
    <div class="item-meta" id="apptMsg" style="text-align:center; margin-top:6px;"></div>
  </div>
  <div id="apptList"></div>
  <div class="note" data-i18n="apptNote"></div>
</section>

<section class="panel" id="panel-tasks">
  <div class="add-card">
    <input id="taskInput" data-i18n-ph="taskPh" placeholder="Add a new task…">
    <button class="primary" id="taskAdd" data-i18n="add">Add</button>
  </div>
  <div id="taskList"></div>
  <div class="note" data-i18n="taskNote"></div>
</section>

<section class="panel" id="panel-habits">
  <div class="week-head">
    <button class="week-nav" id="weekPrev" aria-label="Previous week">‹</button>
    <div class="week-range mono" id="weekRange">—</div>
    <button class="week-nav" id="weekNext" aria-label="Next week">›</button>
  </div>
  <div class="week-strip" id="weekStrip"></div>
  <div id="habitList"></div>
  <div class="note" data-i18n="habitNote"></div>

  <div class="section-divider" data-i18n="foodDivider">🍽️ Food</div>
  <div class="cal-total">
    <span data-i18n="foodCaloriesToday">Today's calories</span>
    <span class="n mono" id="foodTotal">0</span>
  </div>
  <div class="add-card">
    <input id="foodText" data-i18n-ph="foodPh" placeholder="What did you eat / amount…">
    <div class="row2">
      <input id="foodCal" type="number" inputmode="numeric" data-i18n-ph="foodCalPh" placeholder="Calories (optional)" class="mono">
    </div>
    <button class="primary" id="foodAdd" data-i18n="foodLog">Log</button>
  </div>
  <div id="foodList"></div>
</section>

<section class="panel" id="panel-ideas">
  <div class="add-card">
    <input id="ideaTitle" data-i18n-ph="ideaTitlePh" placeholder="Idea title…">
    <div class="acct-toggle">
      <button type="button" class="acct-btn active" id="acctTech" data-acct="tech" data-i18n="acctTech">🎬 Tech — @tech3zoz</button>
      <button type="button" class="acct-btn" id="acctChef" data-acct="chef" data-i18n="acctChef">🍳 Cooking — @chef3zoz</button>
    </div>
    <div class="row2">
      <input id="ideaDate" type="date" class="mono">
    </div>
    <textarea id="ideaScript" data-i18n-ph="ideaScriptPh" placeholder="Script space (optional)…"></textarea>
    <button class="primary" id="ideaAdd" data-i18n="ideaAdd">Add idea</button>
  </div>
  <div id="scheduledWidget"></div>
  <div class="filter-row">
    <button class="filter-chip active" data-filter="all" data-i18n="filterAll">All</button>
    <button class="filter-chip" data-filter="tech" data-i18n="filterTech">🎬 Tech</button>
    <button class="filter-chip" data-filter="chef" data-i18n="filterChef">🍳 Cooking</button>
  </div>
  <div id="ideaList"></div>
  <div class="note" data-i18n="ideaNote"></div>
</section>

<div id="undoToast"></div>

<nav class="bottom">
  <button class="active" data-tab="cal"><span class="ic"><svg viewBox="0 0 24 24" width="20" height="20" fill="#FBBF24"><path d="M20,13.17V13a8,8,0,0,0-2.42-5.74A7.84,7.84,0,0,0,14.4,5.38l-.05,0A8.24,8.24,0,0,0,11.76,5,8.21,8.21,0,0,0,4,13.17,3,3,0,0,0,5,19H19a3,3,0,0,0,1-5.83ZM19,17H5a1,1,0,0,1,0-2H7a1,1,0,0,0,0-2H6A6.41,6.41,0,0,1,9,7.85V11a1,1,0,0,0,2,0V7.09A7.34,7.34,0,0,1,11.82,7H12a5.56,5.56,0,0,1,1,.1V11a1,1,0,0,0,2,0V7.82a6.65,6.65,0,0,1,1.18.87A6,6,0,0,1,18,13H17a1,1,0,0,0,0,2h2a1,1,0,0,1,0,2Z"/></svg></span><span data-i18n="navShifts">Shifts</span></button>
  <button data-tab="appt"><span class="ic">🗓️</span><span data-i18n="navAppt">Appointments</span></button>
  <button data-tab="tasks"><span class="ic">✅</span><span data-i18n="navTasks">Tasks</span></button>
  <button data-tab="habits"><span class="ic"><svg viewBox="0 0 24 24" width="20" height="20"><circle cx="11" cy="13" r="8.5" fill="#EF4444"/><circle cx="11" cy="13" r="5.6" fill="#FFFFFF"/><circle cx="11" cy="13" r="2.8" fill="#EF4444"/><path d="M14 10 L20 4" stroke="#1F2937" stroke-width="1.6" stroke-linecap="round"/><path d="M20 4 L16.7 4.6 L19.4 7.3 Z" fill="#1F2937"/></svg></span><span data-i18n="navHabits">Habits</span></button>
  <button data-tab="ideas"><span class="ic">💡</span><span data-i18n="navIdeas">Ideas</span></button>
</nav>

<!-- ================= SETTINGS SHEET ================= -->
<div class="settings-sheet" id="settingsSheet">
  <div class="settings-head">
    <h2 data-i18n="settings">Settings</h2>
    <button class="sheet-close" data-close-settings aria-label="Close">✕</button>
  </div>
  <div class="settings-body">
    <div class="settings-group">
      <div class="settings-label" data-i18n="settingsLanguage">Language</div>
      <div class="seg">
        <button type="button" class="seg-btn" data-set-lang="en" data-i18n="langEn">English</button>
        <button type="button" class="seg-btn" data-set-lang="ar" data-i18n="langAr">العربية</button>
      </div>
    </div>
    <div class="settings-group">
      <div class="settings-label" data-i18n="settingsTheme">Theme</div>
      <div class="seg">
        <button type="button" class="seg-btn" data-set-theme="minimal" data-i18n="themeMinimal">Minimal</button>
        <button type="button" class="seg-btn" data-set-theme="starry" data-i18n="themeStarry">Starry</button>
      </div>
    </div>
    <div class="settings-group">
      <div class="settings-label" data-i18n="settingsShift">My shift rotation</div>
      <div class="settings-hint" data-i18n="shiftHint"></div>
      <div class="shift-options" id="shiftOptions"></div>
    </div>
  </div>
</div>

<!-- ================= NEW HABIT SHEET ================= -->
<div class="settings-sheet" id="habitSheet">
  <div class="settings-head">
    <h2 data-i18n="newHabit">New Habit</h2>
    <button class="sheet-close" data-close-sheet aria-label="Close">✕</button>
  </div>
  <div class="settings-body">
    <input id="habitInput" class="sheet-input" data-i18n-ph="habitPh" placeholder="New habit…">
    <div class="picker-label" data-i18n="iconLabel">Icon</div>
    <div class="icon-row">
      <input id="habitIcon" class="icon-input" value="⭐" inputmode="text" autocomplete="off">
      <div class="emoji-grid" id="emojiSuggest"></div>
    </div>
    <div class="picker-hint" data-i18n="emojiHint"></div>
    <div class="picker-label" data-i18n="colorLabel">Color</div>
    <div class="color-row" id="habitColorRow"></div>
    <div class="picker-label" data-i18n="repeatLabel">Repeat on</div>
    <div class="days-row" id="habitDaysSel"></div>
    <div class="row2">
      <input id="habitGoal" type="number" inputmode="numeric" class="mono sheet-input" data-i18n-ph="goalPh" placeholder="Goal (optional)">
      <input id="habitUnit" type="text" class="sheet-input" data-i18n-ph="unitPh" placeholder="Unit (ml, times…)">
    </div>
    <button class="primary sheet-primary" id="habitAdd" data-i18n="add">Add</button>
  </div>
</div>

<!-- ================= WEEKLY SUMMARY SHEET ================= -->
<div class="settings-sheet" id="summarySheet">
  <div class="settings-head">
    <h2 data-i18n="summaryTitle">Weekly Summary</h2>
    <button class="sheet-close" data-close-sheet aria-label="Close">✕</button>
  </div>
  <div class="settings-body">
    <div class="week-head">
      <button class="week-nav" id="sumPrev" aria-label="Previous week">‹</button>
      <div class="week-range mono" id="sumRange">—</div>
      <button class="week-nav" id="sumNext" aria-label="Next week">›</button>
    </div>
    <div class="sum-wrap"><table class="sum-grid" id="summaryGrid"></table></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
